<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Étudiants</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <h2 class="mb-4">🎓 Gestion des Étudiants</h2>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Ajouter un étudiant</h5>
            <form id="studentForm" class="row g-3">
                <div class="col-md-4">
                    <input type="text" id="nom" class="form-control" placeholder="Nom complet" required>
                </div>
                <div class="col-md-4">
                    <input type="email" id="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="col-md-4">
                    <input type="text" id="filiere" class="form-control" placeholder="Filière (ex: IT)" required>
                </div>
                <div class="col-md-2">
                    <input type="number" id="niveau" class="form-control" placeholder="Niveau (1-5)" min="1" max="5" required>
                </div>
                <div class="col-md-10">
                    <button type="submit" class="btn btn-primary">Enregistrer l'étudiant</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title">Liste des inscrits</h5>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Filière</th>
                        <th>Niveau</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentList">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
